name: Sync develop

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  sync:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward develop to main
        run: git push origin main:develop