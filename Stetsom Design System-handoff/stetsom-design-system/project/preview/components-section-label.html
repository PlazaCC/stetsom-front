<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Black.ttf"); font-weight: 900; }
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Medium.ttf"); font-weight: 500; }
@font-face { font-family: "Barlow"; src: url("../fonts/Barlow-Regular.ttf"); font-weight: 400; }
@font-face { font-family: "Barlow"; src: url("../fonts/Barlow-Medium.ttf"); font-weight: 500; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.label { font-size: 10px; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
  <!-- Section Label Pattern -->
  <div>
    <div class="label">Section Label Pattern (Light BG)</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:24px;height:1px;background:rgb(232,19,42)"></div>
      <span style="font-family:'Barlow Condensed';font-weight:500;font-size:16px;text-transform:uppercase;color:rgb(232,19,42)">NOSSA HISTÓRIA</span>
    </div>
    <div style="font-family:'Barlow Condensed';font-weight:900;font-size:40px;line-height:1;text-transform:uppercase;color:#121212;margin-top:4px">CONSTRUINDO COM PROPÓSITO</div>
    <div style="font-family:Barlow;font-weight:400;font-size:16px;color:#666;margin-top:4px;line-height:1.5">Cada produto é projetado para quem leva o som a sério.</div>
  </div>

  <!-- Dark version -->
  <div style="background:rgb(18,18,18);padding:20px;border-radius:4px">
    <div class="label" style="color:#555">Section Label Pattern (Dark BG)</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:24px;height:1px;background:rgb(232,19,42)"></div>
      <span style="font-family:'Barlow Condensed';font-weight:500;font-size:16px;text-transform:uppercase;color:rgb(232,19,42)">@STETSOMBRASIL</span>
    </div>
    <div style="font-family:'Barlow Condensed';font-weight:900;font-size:40px;line-height:1;text-transform:uppercase;color:#fff;margin-top:4px">MÍDIAS SOCIAIS</div>
    <div style="font-family:Barlow;font-weight:500;font-size:16px;color:rgb(184,184,184);margin-top:4px">Participe da comunidade de profissionais do áudio.</div>
  </div>
</body>
</html>
