<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Bold.ttf"); font-weight: 700; }
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Black.ttf"); font-weight: 900; }
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Medium.ttf"); font-weight: 500; }
@font-face { font-family: "Barlow"; src: url("../fonts/Barlow-Regular.ttf"); font-weight: 400; }
@font-face { font-family: "Barlow"; src: url("../fonts/Barlow-Medium.ttf"); font-weight: 500; }
@font-face { font-family: "Barlow"; src: url("../fonts/Barlow-SemiBold.ttf"); font-weight: 600; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f4f2; font-family: sans-serif; padding: 24px; display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }

.product-card {
  background: #fff;
  border: 1px solid rgb(217,217,217);
  border-radius: 8px;
  width: 200px;
  overflow: hidden;
}
.product-card-img {
  background: #f8f8f8;
  height: 140px;
  display: flex; align-items: center; justify-content: center;
}
.product-card-img img { max-width: 90%; max-height: 90%; object-fit: contain; }
.product-card-body { padding: 12px; }
.product-card-category {
  font-family: "Barlow Condensed", sans-serif; font-weight: 500;
  font-size: 11px; text-transform: uppercase; color: rgb(232,19,42);
  margin-bottom: 4px;
}
.product-card-name {
  font-family: "Barlow Condensed", sans-serif; font-weight: 700;
  font-size: 16px; text-transform: uppercase; color: #121212;
  line-height: 1.1; margin-bottom: 6px;
}
.product-card-spec {
  font-family: Barlow, sans-serif; font-weight: 400;
  font-size: 12px; color: #888;
}
.product-card-footer {
  border-top: 1px solid rgb(241,241,241);
  padding: 8px 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.badge {
  background: rgb(232,19,42);
  color: #fff;
  font-family: "Barlow Condensed", sans-serif; font-weight: 700;
  font-size: 11px; text-transform: uppercase; padding: 2px 8px;
}

/* Stat card */
.stat-card {
  background: rgb(18,18,18);
  padding: 20px 24px;
  min-width: 120px;
}
.stat-num {
  font-family: "Barlow Condensed", sans-serif; font-weight: 700;
  font-size: 40px; line-height: 1; color: #fff;
}
.stat-label {
  font-family: Barlow, sans-serif; font-weight: 500;
  font-size: 13px; text-transform: uppercase; color: rgb(184,184,184);
  margin-top: 4px;
}
</style>
</head>
<body>
  <!-- Product Card -->
  <div>
    <div class="product-card">
      <div class="product-card-img">
        <img src="../assets/product-image.png" alt="product">
      </div>
      <div class="product-card-body">
        <div class="product-card-category">Amplificador</div>
        <div class="product-card-name">ST-4000EQ<br>4 CANAIS</div>
        <div class="product-card-spec">4x 1000W RMS</div>
      </div>
      <div class="product-card-footer">
        <span class="badge">Novo</span>
        <span style="font-family:'Barlow Condensed';font-size:12px;color:rgb(232,19,42);font-weight:500;cursor:pointer">Ver mais ›</span>
      </div>
    </div>
    <div style="font-size:10px;color:#aaa;text-align:center;margin-top:6px">Product Card</div>
  </div>

  <!-- Stat Cards -->
  <div>
    <div style="display:flex;gap:8px">
      <div class="stat-card">
        <div class="stat-num">35+</div>
        <div class="stat-label">Anos de Mercado</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">200+</div>
        <div class="stat-label">Produtos</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">1M+</div>
        <div class="stat-label">Unidades Vendidas</div>
      </div>
    </div>
    <div style="font-size:10px;color:#aaa;text-align:center;margin-top:6px">Stat Cards</div>
  </div>
</body>
</html>
