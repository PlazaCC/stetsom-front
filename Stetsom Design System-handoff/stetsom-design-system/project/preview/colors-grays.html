<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Black.ttf"); font-weight: 900; }
@font-face { font-family: "Barlow"; src: url("../fonts/Barlow-Regular.ttf"); font-weight: 400; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: "Barlow", sans-serif; padding: 20px; }
.row { display: flex; gap: 0; flex-wrap: wrap; }
.swatch { width: 70px; display: flex; flex-direction: column; }
.color { height: 50px; border: 1px solid rgba(0,0,0,0.07); }
.label { font-size: 9px; color: #555; padding: 3px 2px; line-height: 1.3; }
.val { font-size: 8px; color: #aaa; }
.group-title { font-family: "Barlow Condensed", sans-serif; font-weight: 900; font-size: 11px; text-transform: uppercase; color: #999; letter-spacing: 1px; margin: 14px 0 6px; }
</style>
</head>
<body>
<div class="group-title">Gray Scale</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:rgb(44,44,44)"></div><div class="label">900<br><span class="val">#2c2c2c</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(54,54,54)"></div><div class="label">800<br><span class="val">#363636</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(86,86,86)"></div><div class="label">700<br><span class="val">#565656</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(102,102,102)"></div><div class="label">600<br><span class="val">#666</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(113,113,122)"></div><div class="label">500<br><span class="val">#71717a</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(133,133,133)"></div><div class="label">400<br><span class="val">#858585</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(184,184,184)"></div><div class="label">300<br><span class="val">#b8b8b8</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(217,217,217)"></div><div class="label">200<br><span class="val">#d9d9d9</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(241,241,241)"></div><div class="label">100<br><span class="val">#f1f1f1</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(245,244,242); border:1px solid #e8e8e8"></div><div class="label">Off-wh<br><span class="val">#f5f4f2</span></div></div>
</div>
<div class="group-title">Semantic Surfaces</div>
<div class="row">
  <div class="swatch" style="width:90px"><div class="color" style="background:rgb(255,255,255); border:1px solid #ddd"></div><div class="label">bg-primary<br><span class="val">White</span></div></div>
  <div class="swatch" style="width:90px"><div class="color" style="background:rgb(18,18,18)"></div><div class="label">bg-dark<br><span class="val">Dark</span></div></div>
  <div class="swatch" style="width:90px"><div class="color" style="background:rgb(245,244,242); border:1px solid #e8e8e8"></div><div class="label">bg-alternate<br><span class="val">Off-white</span></div></div>
  <div class="swatch" style="width:90px"><div class="color" style="background:rgb(232,19,42)"></div><div class="label">text-accent<br><span class="val">Red</span></div></div>
</div>
</body>
</html>
