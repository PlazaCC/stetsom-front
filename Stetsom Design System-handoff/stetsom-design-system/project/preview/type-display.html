<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Black.ttf"); font-weight: 900; }
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Bold.ttf"); font-weight: 700; }
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Medium.ttf"); font-weight: 500; }
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Regular.ttf"); font-weight: 400; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: sans-serif; padding: 24px; }
.specimen { margin-bottom: 12px; display: flex; align-items: baseline; gap: 16px; }
.spec-meta { font-size: 10px; color: #999; width: 130px; flex-shrink: 0; line-height: 1.4; }
.divider { height: 1px; background: #f0f0f0; margin: 12px 0; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="spec-meta">Barlow Condensed<br>Black 900 · 60px<br>ALL CAPS</div>
    <div style="font-family:'Barlow Condensed';font-weight:900;font-size:60px;line-height:1;text-transform:uppercase;color:#121212">NOSSOS PRODUTOS</div>
  </div>
  <div class="divider"></div>
  <div class="specimen">
    <div class="spec-meta">Barlow Condensed<br>Bold 700 · 40px<br>ALL CAPS</div>
    <div style="font-family:'Barlow Condensed';font-weight:700;font-size:40px;line-height:1;text-transform:uppercase;color:#121212">CONHEÇA A PRATICIDADE</div>
  </div>
  <div class="divider"></div>
  <div class="specimen">
    <div class="spec-meta">Barlow Condensed<br>Bold 700 · 30px<br>ALL CAPS</div>
    <div style="font-family:'Barlow Condensed';font-weight:700;font-size:30px;line-height:1;text-transform:uppercase;color:#121212">ALTA POTÊNCIA</div>
  </div>
  <div class="divider"></div>
  <div class="specimen">
    <div class="spec-meta">Barlow Condensed<br>Medium 500 · 16px<br>Section label</div>
    <div style="font-family:'Barlow Condensed';font-weight:500;font-size:16px;line-height:1;text-transform:uppercase;color:rgb(232,19,42)">NOVIDADES</div>
  </div>
</body>
</html>
