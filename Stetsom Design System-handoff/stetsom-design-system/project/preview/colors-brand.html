<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face { font-family: "Barlow Condensed"; src: url("../fonts/BarlowCondensed-Black.ttf"); font-weight: 900; }
@font-face { font-family: "Barlow"; src: url("../fonts/Barlow-Regular.ttf"); font-weight: 400; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: "Barlow", sans-serif; padding: 20px; }
.row { display: flex; gap: 0; flex-wrap: wrap; }
.swatch { width: 80px; display: flex; flex-direction: column; }
.color { height: 60px; border: 1px solid rgba(0,0,0,0.07); }
.label { font-size: 10px; color: #555; padding: 4px 2px; line-height: 1.3; }
.val { font-size: 9px; color: #999; }
.group-title { font-family: "Barlow Condensed", sans-serif; font-weight: 900; font-size: 11px; text-transform: uppercase; color: #999; letter-spacing: 1px; margin: 14px 0 6px; }
</style>
</head>
<body>
<div class="group-title">Brand</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:rgb(232,19,42)"></div><div class="label">Red<br><span class="val">rgb(232,19,42)</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(9,9,11)"></div><div class="label">Black<br><span class="val">rgb(9,9,11)</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(18,18,18)"></div><div class="label">Dark<br><span class="val">rgb(18,18,18)</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(24,24,27)"></div><div class="label">Dark-2<br><span class="val">rgb(24,24,27)</span></div></div>
  <div class="swatch"><div class="color" style="background:rgb(255,255,255); border:1px solid #ddd"></div><div class="label">White<br><span class="val">rgb(255,255,255)</span></div></div>
</div>
</body>
</html>
